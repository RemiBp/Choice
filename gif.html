<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>CHOICE Logo Final – Tick Stylisé Ultra Fidèle</title>
  <style>
    body {
      margin: 0;
      background: #f9f6f0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    svg {
      width: 240px;
      height: 240px;
    }

    .hex-bg {
      fill: #0d2740;
    }

    .c-path {
      fill: none;
      stroke: #f9f6f0;
      stroke-width: 18;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 520;
      stroke-dashoffset: 520;
      animation: drawC 1.6s ease-out forwards;
    }

    .tick-path {
      fill: none;
      stroke: #f9f6f0;
      stroke-width: 18;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: 200;
      stroke-dashoffset: 200;
      animation: drawTick 1.4s ease-out forwards;
      animation-delay: 1.5s;
    }

    @keyframes drawC {
      to { stroke-dashoffset: 0; }
    }

    @keyframes drawTick {
      to { stroke-dashoffset: 0; }
    }
  </style>
</head>
<body>

<svg viewBox="0 0 240 240">
  <!-- Hexagone plein -->
  <path class="hex-bg"
        d="M120,10 L205,55 L205,165 L120,210 L35,165 L35,55 Z" />

  <!-- C centré et fidèle -->
  <path class="c-path"
        d="M160,60
           A65,65 0 1,0 160,160" />

  <!-- Tick stylisé avec ancrage profond et élévation douce -->
  <path class="tick-path"
        d="M102,132
           Q112,142 122,132
           Q145,108 165,90" />
</svg>

</body>
</html>
