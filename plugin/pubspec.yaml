name: flutter_app_badger_and_contacts
description: Plugins Flutter pour les badges d'application et l'accès aux contacts (iOS et Android).
version: 1.5.0+1
homepage: https://github.com/RemiBp/Choice.git

environment:
  sdk: ">=2.12.0 <4.0.0"
  flutter: ">=2.0.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: fr.g123k.flutterappbadger
        pluginClass: FlutterAppBadgerPlugin
        # Configuration pour contacts_service
        contacts_service:
          package: fr.remibp.contactsservice
          pluginClass: ContactsServicePlugin
          default_package: contacts_service
      ios:
        pluginClass: FlutterAppBadgerPlugin
        # Configuration pour contacts_service
        contacts_service:
          pluginClass: ContactsServicePlugin
          default_package: contacts_service 