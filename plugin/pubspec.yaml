name: flutter_app_badger
description: Un plugin Flutter pour ajouter des badges d'application sur les icônes d'application (iOS et Android).
version: 1.5.0+1
homepage: https://github.com/RemiBp/flutter_app_badger_fork

environment:
  sdk: ">=2.12.0 <4.0.0"
  flutter: ">=2.0.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: fr.g123k.flutterappbadger
        pluginClass: FlutterAppBadgerPlugin
      ios:
        pluginClass: FlutterAppBadgerPlugin 