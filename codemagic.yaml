workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    environment:
      flutter: stable
      xcode: latest
      cocoapods: latest  # 🔥 Assure une version à jour de CocoaPods
    scripts:
      - name: Clean Flutter project
        script: |
          flutter clean
          flutter pub get

      - name: Set iOS deployment target
        script: |
          cd ios
          if [ -f "Podfile" ]; then
            sed -i '' 's/platform :ios, .*/platform :ios, "14.0"/' Podfile
          else
            echo "🚨 Podfile non trouvé ! Assure-toi que ton projet Flutter iOS est bien configuré."
            exit 1
          fi

      - name: Update CocoaPods
        script: |
          sudo gem install cocoapods --pre
          pod repo update

      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install --repo-update --verbose

      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      email:
        recipients:
          - "remi.barbier@hec.edu"
