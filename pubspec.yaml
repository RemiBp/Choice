name: choice_app
description: "Une application Flutter pour explorer des lieux en fonction de critères personnalisés."

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  geolocator: ^10.1.0
  google_maps_flutter: ^2.5.3
  flutter_plugin_android_lifecycle: ^2.0.17
  flutter_secure_storage: ^9.0.0

  # Core
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  http: ^1.1.0
  provider: ^6.1.1
  
  # UI et Charts
  fl_chart: ^0.70.0
  syncfusion_flutter_charts: ^28.2.7
  flutter_svg: ^2.0.10
  photo_view: ^0.14.0
  cached_network_image: ^3.3.0
  visibility_detector: ^0.4.0+2
  carousel_slider: ^4.2.1

  # Média et Vidéo
  video_player: ^2.7.2
  video_player_platform_interface: ^6.2.2
  video_player_web: ^2.1.1
  image_picker: ^1.1.2
  expandable_text: ^2.3.0
  
  # Chat et UI
  flutter_chat_ui: ^1.6.12
  flutter_chat_types: ^3.6.2
  
  # Storage et Sécurité
  shared_preferences: ^2.2.2
  
  # Paiement et WebView
  flutter_stripe: ^11.4.0
  webview_flutter: ^4.4.3
  
  # Calendrier
  add_2_calendar: ^3.0.1
  
  # Icônes et Assets
  flutter_launcher_icons: ^0.13.1

  # Maps pour le Web
  flutter_map: ^7.0.0
  flutter_map_marker_cluster: ^1.4.0
  flutter_map_marker_popup: ^7.0.0
  latlong2: ^0.9.0
  
  # Support Web (commenté pour éviter les conflits)
  # webview_flutter_web: ^0.2.2
  # js: ^0.6.7

dependency_overrides:
  # Définir des versions TRÈS spécifiques pour geolocator et toutes ses dépendances
  geolocator: 10.0.0
  geolocator_android: 4.2.4
  geolocator_apple: 2.2.5
  geolocator_web: 2.1.6
  geolocator_windows: 0.1.1
  geolocator_platform_interface: 4.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/app_icon.png
    - assets/images/custom_marker.svg

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_icon.png"